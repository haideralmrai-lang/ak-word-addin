<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
html,body{width:1600px;height:180px;overflow:hidden}
.lh{width:1600px;height:180px;background:linear-gradient(135deg,#1a3a2a 0%,#244e38 100%);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 72px;position:relative;overflow:hidden}
.lh:after{content:'';position:absolute;left:-90px;top:-90px;width:270px;height:270px;background:radial-gradient(circle,rgba(176,141,79,.32),transparent 68%);border-radius:50%}
.brand{display:flex;align-items:center;gap:24px;position:relative;z-index:1}
.brand img{height:84px;width:auto;object-fit:contain;filter:brightness(0) invert(1)}
.name{font-size:36px;font-weight:900;line-height:1.12;letter-spacing:.3px}
.name small{display:block;font-size:18px;font-weight:700;color:rgba(255,255,255,.92);margin-top:4px}
.doc{position:relative;z-index:1;text-align:left}
.doc .dt{font-size:44px;font-weight:900;color:#c9a25e;line-height:1}
.meta{display:flex;gap:22px;margin-top:14px;justify-content:flex-end}
.meta span{font-size:15px;color:rgba(255,255,255,.85);direction:ltr;white-space:nowrap;letter-spacing:.3px}
</style>
</head>
<body>
<div class="lh">
  <div class="brand">
    <img src="https://aklaw-sa.com/wp-content/uploads/2026/05/Artboard-2.png" alt="AK"/>
    <div class="name">عبدالله خالد الراشد<small>للمحاماة والاستشارات القانونية</small></div>
  </div>
  <div class="doc">
    <div class="dt">مستند</div>
    <div class="meta"><span>C.R. 2051257343</span><span>License 439/45</span><span>VAT 312388434200003</span></div>
  </div>
</div>
</body>
</html>
