<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>مساعد AK للصياغة</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{--g:#21412f;--gd:#16301f;--g2:#2c5440;--gold:#bd9552;--gold2:#d8b878;--ink:#16261d;--muted:#6b7b72;--line:#e6ebe7;--bg:#f4f7f5;--tint:#eef4ef}
*{box-sizing:border-box;font-family:"Tajawal",sans-serif}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh}

.hd{background:rgba(255,255,255,.88);backdrop-filter:blur(18px);color:var(--ink);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;flex:0 0 auto;border-bottom:1px solid rgba(33,65,47,.1);box-shadow:0 8px 24px rgba(15,23,42,.05)}
.hd .l{display:flex;align-items:center;gap:10px}
.hd .logo{width:38px;height:38px;border-radius:10px;background:var(--g2);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;overflow:hidden}
.hd .logo img{width:25px;height:25px;object-fit:contain;filter:brightness(0) invert(1)}
.hd .logo{display:none}
.hd b{display:block;font-size:1rem;font-weight:900;line-height:1.2;color:var(--gd)}.hd .sub{display:block;font-size:.67rem;color:var(--muted);margin-top:2px}
.hd .nw{width:34px;height:34px;border-radius:10px;background:#fff;color:var(--g);border:1px solid var(--line);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(15,23,42,.06);transition:.18s ease}
.hd .nw:hover{border-color:var(--gold);transform:translateY(-1px)}
.ground{background:linear-gradient(90deg,#f7f9f7,#fffaf0);border-bottom:1px solid #e7ece8;padding:8px 15px;display:flex;align-items:center;gap:7px;flex:0 0 auto}
.ground svg{flex:0 0 auto}.ground span{font-size:.7rem;color:#3f5a4b;font-weight:800}

.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 6px 18px rgba(15,23,42,.05);margin:14px}
label{font-size:.8rem;font-weight:700;display:block;margin-bottom:6px}
input{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:.92rem;font-family:inherit}
input:focus{outline:none;border-color:var(--gold)}
.btn{border:none;border-radius:11px;padding:12px;font-size:.92rem;font-weight:800;cursor:pointer;width:100%}
.btn-primary{background:var(--g);color:#fff}.btn:disabled{opacity:.55}
.status{font-size:.8rem;font-weight:700;margin-top:10px;padding:9px 11px;border-radius:9px;display:none}
.status.show{display:block}.status.err{background:#fdecec;color:#c0392b}.status.warn{background:#fff7e6;color:#9a6b00}

.chat{flex:1 1 auto;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:13px;min-height:0;scroll-behavior:smooth}
.welcome{margin:auto 0;text-align:center;padding:10px;animation:fadeup .45s ease}
.welcome h2{font-size:1.08rem;font-weight:900;margin:0 0 6px;color:var(--gd)}
.welcome p{font-size:.82rem;color:var(--muted);margin:0 0 18px}
.chips{display:flex;flex-direction:column;gap:9px;max-width:320px;margin:0 auto}
.chip{background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:.85rem;font-weight:800;color:var(--ink);cursor:pointer;text-align:right;display:flex;align-items:center;gap:9px;transition:.18s ease;box-shadow:0 8px 24px rgba(15,23,42,.04)}
.chip:hover{border-color:var(--gold);background:#fffdf8;transform:translateY(-1px)}
.chip .ic{color:var(--gold);font-size:1rem;flex:0 0 auto}

.msg{max-width:92%;flex-shrink:0;font-size:.87rem;line-height:1.8;word-break:break-word;animation:fade .3s ease}
.msg.new{animation:fadeup .38s cubic-bezier(.2,.8,.2,1)}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes fadeup{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.msg.u{align-self:flex-start;background:linear-gradient(135deg,var(--g),#315b43);color:#fff;padding:10px 13px;border-radius:15px 15px 15px 5px;white-space:pre-wrap;box-shadow:0 10px 26px rgba(33,65,47,.18)}
.msg.a{align-self:flex-end;width:97%;max-width:97%;background:rgba(255,255,255,.94);border:1px solid rgba(33,65,47,.1);border-radius:16px 16px 5px 16px;overflow:hidden;box-shadow:0 12px 34px rgba(15,23,42,.07)}
.msg.a .ahd{background:linear-gradient(90deg,#fffaf0,#ffffff);border-bottom:1px solid #eee3c9;padding:8px 12px;display:flex;align-items:center;gap:8px}
.msg.a .av{display:none}
.ai-mark{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 5px rgba(189,149,82,.13);flex:0 0 auto}
.msg.a .ahd b{font-size:.74rem;font-weight:900;color:#75591f}
.msg.a .body{padding:12px 13px;white-space:normal}
.msg.a.err .body{color:#c0392b;font-weight:700}
.msg.a h3{font-size:.96rem;font-weight:900;margin:2px 0 8px;color:var(--gd);text-align:center}
.msg.a h4{font-size:.88rem;font-weight:800;margin:10px 0 3px;color:var(--gd)}
.msg.a p{margin:0 0 7px}
.msg.a ol,.msg.a ul{margin:5px 0 9px;padding-right:18px;padding-left:0}
.msg.a li{margin-bottom:5px}.msg.a strong{font-weight:800}
.acts{display:flex;gap:6px;padding:9px 12px;border-top:1px solid #eef2ee}
.acts button{font-family:inherit;cursor:pointer;border-radius:8px;font-size:.74rem;font-weight:800;padding:7px 10px;display:inline-flex;align-items:center;gap:5px;border:1px solid}
.acts .ins{flex:1;justify-content:center;background:var(--g);color:#fff;border-color:var(--g)}
.acts .sec{background:#fff;color:#54635b;border-color:var(--line)}

.think{align-self:flex-end;flex-shrink:0;width:86%;max-width:320px;background:rgba(255,255,255,.96);border:1px solid rgba(33,65,47,.11);border-radius:16px 16px 5px 16px;padding:13px 14px 12px;box-shadow:0 12px 32px rgba(15,23,42,.07);overflow:hidden}
.think-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:11px}
.tlabel{font-size:.79rem;color:#52675a;font-weight:900;min-width:0}
.pulse-dot{width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 0 rgba(189,149,82,.34);animation:pulse 1.45s infinite}
.think-flow{position:relative;height:32px;border-radius:12px;background:linear-gradient(90deg,#f3f7f4,#fffaf0);overflow:hidden}
.think-flow:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.8),transparent);transform:translateX(100%);animation:sweep 1.8s infinite}
.think-flow i{position:absolute;right:14px;height:4px;border-radius:999px;background:linear-gradient(90deg,var(--g),var(--gold));opacity:.75;animation:linewrite 1.7s infinite ease-in-out}
.think-flow i:nth-child(1){top:8px;width:58%;animation-delay:0s}
.think-flow i:nth-child(2){top:15px;width:78%;animation-delay:.16s}
.think-flow i:nth-child(3){top:22px;width:44%;animation-delay:.32s}
@keyframes pulse{70%{box-shadow:0 0 0 9px rgba(189,149,82,0)}100%{box-shadow:0 0 0 0 rgba(189,149,82,0)}}
@keyframes sweep{to{transform:translateX(-100%)}}
@keyframes linewrite{0%,100%{transform:scaleX(.35);opacity:.3;transform-origin:right}45%{transform:scaleX(1);opacity:.9;transform-origin:right}}
.streaming-card .body{position:relative;padding-bottom:42px}
.stream-text{animation:inkIn .28s ease}
.stream-loader{position:absolute;right:13px;left:13px;bottom:12px;height:18px;display:flex;align-items:center;gap:7px}
.stream-loader span{height:3px;border-radius:999px;background:linear-gradient(90deg,var(--g),var(--gold));animation:typebar 1.35s infinite ease-in-out}
.stream-loader span:nth-child(1){width:18%;animation-delay:0s}
.stream-loader span:nth-child(2){width:31%;animation-delay:.12s}
.stream-loader span:nth-child(3){width:12%;animation-delay:.24s}
.caret{display:inline-block;width:6px;height:1.15em;margin-right:3px;border-radius:3px;background:var(--gold);vertical-align:-.2em;animation:blink .85s steps(1) infinite}
@keyframes inkIn{from{opacity:.72;filter:blur(.4px)}to{opacity:1;filter:none}}
@keyframes typebar{0%,100%{opacity:.22;transform:scaleX(.35);transform-origin:right}45%{opacity:.95;transform:scaleX(1);transform-origin:right}}
@keyframes blink{50%{opacity:0}}

.files{display:flex;flex-wrap:wrap;gap:6px;padding:0 14px}
.fchip{font-size:.72rem;font-weight:700;background:#fff;border:1px solid var(--line);border-radius:9px;padding:4px 9px;display:flex;align-items:center;gap:6px}
.fchip .ti{color:#c0392b;flex:0 0 auto}
.fchip .x{cursor:pointer;color:#c0392b;font-weight:900}
.fchip .pg{color:#9a6b00}
.chat-tools{position:relative;padding:8px 12px 0;background:#fff;flex:0 0 auto}
.tools-toggle{width:100%;height:36px;border:1px solid #dce7e0;background:#f7faf8;color:var(--g);border-radius:12px;font-size:.78rem;font-weight:900;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer}
.tools-toggle:hover{background:#fffaf0;border-color:var(--gold)}
.tools-panel{display:none;margin-top:8px;padding:10px;border:1px solid #e3ebe6;background:#fff;border-radius:14px;box-shadow:0 14px 34px rgba(15,23,42,.08);animation:fadeup .18s ease}
.chat-tools.open .tools-panel{display:block}
.quick{display:none;gap:6px;padding:9px 12px 0;overflow-x:auto;flex:0 0 auto;background:#fff}
#appView.tools-open .quick{display:flex}
.quick::-webkit-scrollbar{display:none}
.qc{white-space:nowrap;background:#f6f9f7;border:1px solid #dde7e0;color:var(--g2);border-radius:20px;padding:6px 12px;font-size:.74rem;font-weight:900;cursor:pointer;flex:0 0 auto;transition:.16s ease}
.qc:hover{background:#fffaf0;border-color:var(--gold)}
.toolbar{display:none;gap:8px;padding:8px 12px 0;background:#fff;flex:0 0 auto}
#appView.tools-open .toolbar{display:flex}
.tbtn{font-size:.76rem;font-weight:800;color:var(--g);background:var(--tint);border:1px solid #cfe6da;border-radius:9px;padding:7px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.tbtn:hover{background:#e3f0e9}
.msg-files{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.msg-file{display:inline-flex;align-items:center;gap:5px;max-width:100%;padding:4px 8px;border-radius:9px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);font-size:.72rem;font-weight:800}
.history-bar{background:#fff;padding:8px 12px;border-bottom:1px solid #edf1ee;flex:0 0 auto}
.hist{display:none}
.hist-toggle{height:36px;width:100%;border:1px solid var(--line);border-radius:12px;background:#f8fbf9;color:var(--g);font-family:inherit;font-size:.78rem;font-weight:900;cursor:pointer}
.hist-toggle:hover{background:#fffaf0;border-color:var(--gold)}
.hist-panel{display:none;margin-top:8px;border:1px solid #e1e9e4;background:#fff;border-radius:14px;box-shadow:0 14px 34px rgba(15,23,42,.08);overflow:hidden;max-height:190px;overflow-y:auto}
.history-bar.open .hist-panel{display:block}
.hist-empty{padding:12px;color:var(--muted);font-size:.78rem;font-weight:800;text-align:center}
.hist-item{width:100%;border:0;border-bottom:1px solid #eef2ef;background:#fff;padding:10px 12px;text-align:right;font-family:inherit;cursor:pointer;color:var(--ink)}
.hist-item:hover,.hist-item.active{background:#f6faf7}
.hist-item b{display:block;font-size:.8rem;font-weight:900;color:var(--g);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-item span{display:block;margin-top:2px;font-size:.68rem;color:var(--muted)}
.inbar{display:flex;gap:8px;padding:10px 12px;background:#fff;align-items:flex-end;flex:0 0 auto}
.compose{flex:1;display:flex;align-items:flex-end;gap:6px;background:#f7f9f7;border:1.5px solid var(--line);border-radius:22px;padding:4px 6px 4px 6px;transition:.18s ease;box-shadow:inset 0 1px 0 rgba(255,255,255,.8)}
.compose.foc{border-color:var(--gold);background:#fff;box-shadow:0 0 0 4px rgba(189,149,82,.1)}
.compose textarea{flex:1;resize:none;height:36px;max-height:120px;padding:8px 8px;border:none;background:transparent;font-size:.9rem;font-family:inherit;outline:none}
.cbtn{flex:0 0 auto;width:34px;height:34px;border-radius:50%;border:none;cursor:pointer;font-size:1.05rem;display:flex;align-items:center;justify-content:center;background:transparent;color:#7c8b82}
.cbtn.send{background:var(--g);color:#fff}.cbtn:disabled{opacity:.45}
.foot{text-align:center;padding:5px}.foot a{font-size:.72rem;color:var(--muted);text-decoration:none}
.hidden{display:none!important}
@media (prefers-reduced-motion:reduce){
  *,*:before,*:after{animation-duration:.01ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important}
}
</style>
</head>
<body>
  <div class="hd">
    <div class="l">
      <div class="logo"><img src="https://aklaw-sa.com/wp-content/uploads/2026/05/Artboard-2.png" alt="AK"/></div>
      <div><b>مساعد الصياغة</b><span class="sub">شركة عبدالله خالد الراشد</span></div>
    </div>
    <button id="newChat" class="nw hidden" title="محادثة جديدة">✎</button>
  </div>

  <div id="historyBar" class="history-bar hidden">
    <button id="historyToggle" class="hist-toggle" type="button">المحادثات السابقة</button>
    <div id="historyPanel" class="hist-panel"></div>
    <select id="historySelect" class="hist" title="المحادثات السابقة"></select>
  </div>

  <div id="groundBar" class="ground hidden">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2c5440" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 19a2 2 0 0 1 2-2h14"/><path d="M5 17V5a2 2 0 0 1 2-2h12v14"/></svg>
    <span>مستند إلى ٦ أنظمة رسمية · ٧٧ مرجعاً قضائياً · مكتبة صياغاتك</span>
  </div>

  <!-- LOGIN -->
  <div id="loginView" class="card">
    <p style="font-weight:900;margin:0 0 10px">تسجيل الدخول</p>
    <label>اسم المستخدم</label>
    <input id="user" type="text" autocomplete="username"/>
    <label style="margin-top:10px">Application Password</label>
    <input id="pass" type="password" autocomplete="current-password"/>
    <button id="loginBtn" class="btn btn-primary" style="margin-top:14px">دخول</button>
    <div id="loginStatus" class="status"></div>
  </div>

  <!-- CHAT -->
  <div id="appView" class="hidden" style="flex:1 1 auto;display:flex;flex-direction:column;min-height:0">
    <div id="chat" class="chat"></div>
    <div id="files" class="files"></div>
    <div class="chat-tools"><button id="toolsToggle" class="tools-toggle" type="button">الأدوات السريعة</button></div>
    <div class="quick">
      <span class="qc" data-fill="اكتب صحيفة دعوى كاملة بناءً على المرفقات وما شرحته.">صحيفة دعوى</span>
      <span class="qc" data-fill="اكتب مذكرة جوابية كاملة بناءً على المرفقات.">مذكرة جوابية</span>
      <span class="qc" data-fill="احسب مستحقات نهاية الخدمة بالتفصيل بناءً على المرفقات.">نهاية الخدمة</span>
      <span class="qc" data-action="style">بأسلوبي</span>
    </div>
    <div class="toolbar"><button id="lhBtn" class="tbtn"><i style="font-style:normal">🏛️</i> طبّق الورق الرسمي</button></div>
    <div class="inbar">
      <input id="fileInput" type="file" accept=".pdf,image/*,audio/*,video/*" multiple class="hidden"/>
      <div class="compose" id="compose">
        <button id="attachBtn" class="cbtn" title="إرفاق">📎</button>
        <textarea id="chatInput" placeholder="اكتب طلبك أو ارفق مستنداً…"></textarea>
        <button id="sendBtn" class="cbtn send" title="إرسال">↑</button>
      </div>
    </div>
    <div class="foot"><a href="#" id="logout">تسجيل خروج</a></div>
  </div>

<script>
var API="https://aklaw-sa.com/wp-json/ak/v1/";
function $(id){return document.getElementById(id);}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function mdInline(s){ s=esc(s); s=s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>"); s=s.replace(/__([^_]+)__/g,"<strong>$1</strong>"); return s; }
function mdParse(text){
  var lines=String(text||"").replace(/\r/g,"").split("\n"), blocks=[], list=null;
  function flush(){ if(list){ blocks.push(list); list=null; } }
  for(var i=0;i<lines.length;i++){ var ln=lines[i].trim();
    if(ln===""){ flush(); continue; }
    var num=ln.match(/^(\d+)[\.\)]\s+(.+)$/), bul=ln.match(/^[\*\-•]\s+(.+)$/), hd=ln.match(/^#{1,6}\s*(.+)$/), bold=ln.match(/^\*\*(.+?)\*\*[:：]?\s*$/);
    if(num){ if(!list||list.type!=="ol"){ flush(); list={type:"ol",items:[]}; } list.items.push(num[2]); }
    else if(bul){ if(!list||list.type!=="ul"){ flush(); list={type:"ul",items:[]}; } list.items.push(bul[1]); }
    else if(hd){ flush(); blocks.push({type:"h",text:hd[1]}); }
    else if(bold){ flush(); blocks.push({type:"h",text:bold[1]}); }
    else { flush(); blocks.push({type:"p",text:ln}); }
  }
  flush(); return blocks;
}
function mdToHtml(text){
  var b=mdParse(text), out="", firstH=true;
  for(var i=0;i<b.length;i++){ var x=b[i];
    if(x.type==="h"){ out+= firstH?"<h3>"+mdInline(x.text)+"</h3>":"<h4>"+mdInline(x.text)+"</h4>"; firstH=false; }
    else if(x.type==="p"){ out+="<p>"+mdInline(x.text)+"</p>"; }
    else { out+="<"+x.type+">"+x.items.map(function(it){return "<li>"+mdInline(it)+"</li>";}).join("")+"</"+x.type+">"; }
  }
  return out||("<p>"+esc(text)+"</p>");
}
function mdToWordHtml(text){
  var b=mdParse(text), out="", firstH=true;
  var ff="font-family:'Sakkal Majalla',Tajawal,Tahoma,Arial";
  var body=ff+";direction:rtl;text-align:justify;font-size:15pt;line-height:1.1;color:#111111;margin:0 0 3pt";
  var liS=ff+";direction:rtl;text-align:justify;font-size:15pt;line-height:1.1;color:#111111;margin:0 0 2pt";
  for(var i=0;i<b.length;i++){ var x=b[i];
    if(x.type==="h"){
      out+= firstH ? '<p style="'+ff+';direction:rtl;text-align:center;font-size:17pt;font-weight:bold;color:#111111;line-height:1.15;margin:0 0 8pt">'+mdInline(x.text)+'</p>'
                   : '<p style="'+ff+';direction:rtl;text-align:right;font-size:15pt;font-weight:bold;color:#111111;line-height:1.15;margin:9pt 0 3pt">'+mdInline(x.text)+'</p>';
      firstH=false;
    } else if(x.type==="p"){ out+='<p style="'+body+'">'+mdInline(x.text)+'</p>'; }
    else if(x.type==="ol"){ out+='<ol dir="rtl" style="margin:3pt 0 6pt;padding-right:24px">'+x.items.map(function(it){return '<li style="'+liS+'">'+mdInline(it)+'</li>';}).join("")+'</ol>'; }
    else { out+='<ul dir="rtl" style="margin:3pt 0 6pt;padding-right:24px">'+x.items.map(function(it){return '<li style="'+liS+'">'+mdInline(it)+'</li>';}).join("")+'</ul>'; }
  }
  return out;
}
function token(){return localStorage.getItem("ak_token")||"";}
function setStatus(el,msg,kind){el.className="status show "+(kind||"");el.textContent=msg;}
var chat=[], attachments=[], working=false;
var THINK=["يقرأ المستندات المرفقة…","يطالع الأنظمة والمراجع القضائية…","يستحضر أسلوب صياغاتك…","يصوغ المستند باحتراف…"];
var thinkTimer=null, thinkStage=0;
function startThinking(){ thinkStage=0; updateThink(); thinkTimer=setInterval(function(){ thinkStage=(thinkStage+1)%THINK.length; updateThink(); },2300); }
function stopThinking(){ if(thinkTimer){ clearInterval(thinkTimer); thinkTimer=null; } }
function updateThink(){ var e=document.querySelector(".tlabel"); if(e) e.textContent=THINK[thinkStage]; }
var PHASE={
  prep:"يجهز السياق والمراجع",
  attach:"يربط المرفقات الجاهزة بالطلب",
  send:"يرسل الطلب إلى Gemini 2.5 Pro",
  wait:"ينتظر أول جزء من الرد",
  write:"يكتب الرد الآن",
  style:"يعيد صياغة النص المحدد",
  letterhead:"يطبق الورق الرسمي"
};
var currentPhase=PHASE.prep;
function setPhase(text){ currentPhase=text||PHASE.prep; updateThink(); }
function startThinking(text){ setPhase(text||currentPhase||PHASE.prep); }
function stopThinking(){}
function updateThink(){ document.querySelectorAll(".tlabel").forEach(function(e){ e.textContent=currentPhase; }); }
var SKEY="ak_word_chat_sessions_v1", activeSessionId="";
function sid(){return "s"+Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function sessions(){ try{return JSON.parse(localStorage.getItem(SKEY)||"[]")||[];}catch(e){return [];} }
function setSessions(v){ localStorage.setItem(SKEY,JSON.stringify(v.slice(0,30))); }
function chatTitle(){

  return "محادثة جديدة";
}

  if(!activeSessionId) activeSessionId=sid();

  list.unshift({id:activeSessionId,title:chatTitle(),updated:Date.now(),chat:chat.filter(function(m){return !m.thinking&&!m.streaming;}).map(function(m){return {role:m.role,text:m.text||"",files:m.files||[]};})});

function openConversation(id){
  var s=sessions().filter(function(x){return x.id===id;})[0]; if(!s) return;
  activeSessionId=s.id; chat=s.chat||[]; attachments=[]; if(window.renderFiles) window.renderFiles(); if(chat.length&&window.renderChat) window.renderChat(); else if(window.showWelcome) window.showWelcome(); renderHistory();
}
function initConversations(){
  var list=sessions(); if(list.length){ openConversation(list[0].id); } else { newConversation(); }
  renderHistory();
}
function sessions(){
  try{
    var list=JSON.parse(localStorage.getItem(SKEY)||"[]")||[];
    list=list.filter(function(s){return s&&s.id&&Array.isArray(s.chat)&&s.chat.length;});
    localStorage.setItem(SKEY,JSON.stringify(list.slice(0,30)));
    return list;
  }catch(e){return [];}
}
function setSessions(v){ localStorage.setItem(SKEY,JSON.stringify((v||[]).filter(function(s){return s&&s.chat&&s.chat.length;}).slice(0,30))); }
function persistChat(){
  var clean=chat.filter(function(m){return !m.thinking&&!m.streaming;}).map(function(m){return {role:m.role,text:m.text||"",files:m.files||[]};});
  if(!clean.length) return;
  if(!activeSessionId) activeSessionId=sid();
  var list=sessions().filter(function(s){return s.id!==activeSessionId;});
  list.unshift({id:activeSessionId,title:chatTitle(),updated:Date.now(),chat:clean});
  setSessions(list); renderHistory();
}
function renderHistory(){
  var list=sessions(), sel=$("historySelect");
  if(sel) sel.innerHTML='<option value="">المحادثات السابقة</option>'+list.map(function(s){return '<option value="'+esc(s.id)+'" '+(s.id===activeSessionId?'selected':'')+'>'+esc(s.title||"محادثة")+'</option>';}).join("");
  var panel=$("historyPanel"); if(!panel) return;
  if(!list.length){ panel.innerHTML='<div class="hist-empty">لا توجد محادثات محفوظة بعد</div>'; return; }

    var d=s.updated?new Date(s.updated):null;
    var dt=d?d.toLocaleDateString("ar-SA",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}):"";

}

  function uploadFile(f){
    var mime=f.type||"application/octet-stream";
    if(f.size <= 1024*1024){
      var rd=new FileReader();
      rd.onload=function(){ attachments.push({mime:mime,name:f.name,data:String(rd.result).split(",")[1]||"",ready:true}); renderFiles(); };
      rd.readAsDataURL(f); return;
    }
    var att={mime:mime,name:f.name,ready:false,prog:"يرفع 0%"}; attachments.push(att); renderFiles();
    fetch(API+"upload/start",{method:"POST",headers:{Authorization:"Basic "+token(),"Content-Type":"application/json"},body:JSON.stringify({name:f.name,mime:mime,size:f.size})})
      .then(function(r){return r.ok?r.json():Promise.reject();})
      .then(function(d){ if(!d.upload_id) throw new Error(); return sendChunks(f,d.upload_id,att); })
      .catch(function(){ att.prog="فشل الرفع ✗"; renderFiles(); });
  }
  function sendChunks(f,uploadId,att){
    var CH=5*1024*1024, offset=0;
    function step(){
      var end=Math.min(offset+CH,f.size), last=(end>=f.size), blob=f.slice(offset,end);
      return new Promise(function(res,rej){
        var rd=new FileReader();
        rd.onload=function(){
          var b64=String(rd.result).split(",")[1]||"";
          fetch(API+"upload/chunk",{method:"POST",headers:{Authorization:"Basic "+token(),"Content-Type":"application/json"},body:JSON.stringify({upload_id:uploadId,offset:offset,last:last,data:b64})})
            .then(function(r){return r.ok?r.json():Promise.reject();})
            .then(function(d){
              offset=end; att.prog="يرفع "+Math.round(offset/f.size*100)+"%"; renderFiles();
              if(last){ att.uri=d.uri; att._name=d.name;
                if(d.state==="ACTIVE"){ att.ready=true; att.prog=""; } else { att.prog="يعالج…"; pollStatus(att); }
                renderFiles(); res();
              } else { res(step()); }
            }).catch(rej);
        };
        rd.onerror=rej; rd.readAsDataURL(blob);
      });
    }
    return step();
  }
  function pollStatus(att){
    var n=0; var iv=setInterval(function(){ n++;
      fetch(API+"upload/status?name="+encodeURIComponent(att._name),{headers:{Authorization:"Basic "+token()}})
        .then(function(r){return r.json();})
        .then(function(d){
          if(d.state==="ACTIVE"){ clearInterval(iv); att.ready=true; att.prog=""; if(d.uri)att.uri=d.uri; renderFiles(); }
          else if(d.state==="FAILED"||n>80){ clearInterval(iv); att.prog="فشل المعالجة ✗"; renderFiles(); }
        }).catch(function(){});
    },3000);
  }

  function copyText(t,btn){
    function ok(){ var o=btn.textContent; btn.textContent="✓ نُسخ"; setTimeout(function(){btn.textContent=o;},1500); }
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(ok,function(){fallback(t,ok);}); }
    else fallback(t,ok);
  }
  function fallback(t,ok){ var a=document.createElement("textarea"); a.value=t; document.body.appendChild(a); a.select(); try{document.execCommand("copy");ok();}catch(e){} document.body.removeChild(a); }

  function setBusy(on){ working=on; $("sendBtn").disabled=on; $("attachBtn").disabled=on; if(on) startThinking(); else stopThinking(); }

  /* المسار الجديد: السيرفر يحضّر التوجيه + المفتاح، والجهاز يكلّم Gemini مباشرةً بثّاً (لا جدار سيرفر، لا انقطاع) */
  function send(text){
    if(working) return;
    if($("welcome")) $("welcome").remove();
    var pendingAtts=attachments.filter(function(a){return a.ready;});
    var sentFiles=attachments.map(function(a){return {name:a.name,mime:a.mime,prog:a.prog||""};});
    chat.push({role:"user",text:text,files:sentFiles});
    setPhase(pendingAtts.length?PHASE.attach:PHASE.prep);
    attachments=[]; renderFiles();
    chat.push({role:"model",thinking:true});
    renderChat(); setBusy(true);
    persistChat();
    var atts=pendingAtts.map(function(a){ return a.uri ? {mime:a.mime,uri:a.uri} : {mime:a.mime,data:a.data}; });
    var msgs=chat.filter(function(m){return !m.thinking && !m.streaming;});
    fetch(API+"prep",{method:"POST",headers:{Authorization:"Basic "+token(),"Content-Type":"application/json"},body:JSON.stringify({messages:msgs,doc_type:"",model:"gemini-2.5-pro"})})
      .then(function(r){
        if(r.status===401){ localStorage.removeItem("ak_token"); location.reload(); throw new Error("انتهت الجلسة"); }
        return r.json().then(function(d){ if(!r.ok) throw new Error(d&&d.message?d.message:"تعذّر التحضير"); return d; });
      })
      .then(function(prep){ if(!prep.key||!prep.system) throw new Error("تعذّر التحضير"); return streamGemini(prep,msgs,atts); })
      .catch(function(err){ finishErr((err&&err.message)||"تعذّر الاتصال"); });
  }

  function streamGemini(prep,msgs,atts){
    setPhase(PHASE.wait);
    var contents=[], n=msgs.length;
    for(var i=0;i<n;i++){ var m=msgs[i], role=(m.role==="model")?"model":"user", parts=[{text:String(m.text||"")}];
      if(role==="user"&&i===n-1){ atts.forEach(function(a){ if(a.uri)parts.push({file_data:{mime_type:a.mime,file_uri:a.uri}}); else if(a.data)parts.push({inline_data:{mime_type:a.mime,data:a.data}}); }); }
      contents.push({role:role,parts:parts});
    }
    var body={system_instruction:{parts:[{text:prep.system}]},contents:contents,generationConfig:{temperature:prep.temperature||0.3,maxOutputTokens:prep.maxOutputTokens||16384}};
    var url="https://generativelanguage.googleapis.com/v1beta/models/"+encodeURIComponent(prep.model)+":streamGenerateContent?alt=sse&key="+encodeURIComponent(prep.key);
    var acc="", started=false, buf="";
    function handleLine(line){
      line=line.replace(/\r$/,"").trim();
      if(line.indexOf("data:")!==0) return;
      var js=line.slice(5).trim(); if(!js||js==="[DONE]") return;
      var d; try{ d=JSON.parse(js); }catch(e){ return; }
      if(d.error) throw new Error(d.error.message||"خطأ من الذكاء");
      var ps=(d.candidates&&d.candidates[0]&&d.candidates[0].content&&d.candidates[0].content.parts)||[];
      ps.forEach(function(p){ if(p.text) acc+=p.text; });
      if(!started&&acc){ started=true; beginStream(); }
      if(started) updateStream(acc);
    }
    function drain(flush){ var idx; while((idx=buf.indexOf("\n"))>=0){ handleLine(buf.slice(0,idx)); buf=buf.slice(idx+1); } if(flush&&buf){ handleLine(buf); buf=""; } }
    return fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})
      .then(function(resp){
        if(!resp.ok){ return resp.text().then(function(t){ throw new Error(gemErr(t)); }); }
        if(!resp.body||!resp.body.getReader){ return resp.text().then(function(t){ buf=t; drain(true); finishOk(acc); }); }
        var reader=resp.body.getReader(), dec=new TextDecoder();
        function pump(){ return reader.read().then(function(res){ if(res.done){ drain(true); finishOk(acc); return; } buf+=dec.decode(res.value,{stream:true}); drain(false); return pump(); }); }
        return pump();
      });
  }
  function gemErr(t){ try{ var d=JSON.parse(t); return (d.error&&d.error.message)||String(t).slice(0,160); }catch(e){ return String(t||"خطأ من الذكاء").slice(0,160); } }
  function beginStream(){ setPhase(PHASE.write); stopThinking(); chat[chat.length-1]={role:"model",text:"",streaming:true}; renderChat(); }
  function updateStream(acc){ var sb=document.getElementById("streamBody"); if(sb) sb.innerHTML=mdToHtml(acc)+'<span class="caret">▍</span>'; var box=$("chat"); if(box) box.scrollTop=box.scrollHeight; }
  function finishOk(acc){ if(!String(acc||"").trim()){ finishErr("لا نتيجة من الذكاء — أعد المحاولة"); return; } chat[chat.length-1]={role:"model",text:acc}; setBusy(false); renderChat(); }
  function finishErr(msg){ if(chat.length&&(chat[chat.length-1].thinking||chat[chat.length-1].streaming)) chat.pop(); chat.push({role:"model",text:"⚠️ "+msg}); setBusy(false); renderChat(); }

  function updateStream(acc){ var sb=document.getElementById("streamBody"); if(sb) sb.innerHTML='<div class="stream-text">'+mdToHtml(acc)+'<span class="caret"></span></div><div class="stream-loader"><span></span><span></span><span></span></div>'; var box=$("chat"); if(box) box.scrollTop=box.scrollHeight; }
  function finishOk(acc){ if(!String(acc||"").trim()){ finishErr("لا نتيجة من الذكاء — أعد المحاولة"); return; } chat[chat.length-1]={role:"model",text:acc}; setBusy(false); renderChat(); persistChat(); }
  function finishErr(msg){ if(chat.length&&(chat[chat.length-1].thinking||chat[chat.length-1].streaming)) chat.pop(); chat.push({role:"model",text:"⚠️ "+msg}); setBusy(false); renderChat(); persistChat(); }

  function loadB64(url){
    return fetch(url,{cache:"no-store"}).then(function(r){return r.blob();}).then(function(b){
      return new Promise(function(res,rej){ var rd=new FileReader(); rd.onload=function(){ res(String(rd.result).split(",")[1]); }; rd.onerror=rej; rd.readAsDataURL(b); });
    });
  }
  $("lhBtn").onclick=function(){
    $("lhBtn").disabled=true; var old=$("lhBtn").innerHTML; $("lhBtn").textContent="جاري التطبيق...";
    function done(){ $("lhBtn").disabled=false; $("lhBtn").innerHTML=old; }
    var dir=location.href.replace(/[^/]*$/,"");
    Promise.all([loadB64(dir+"letterhead-head.png"),loadB64(dir+"letterhead-foot.png")]).then(function(im){
      var hHtml='<table border="0" cellpadding="0" cellspacing="0" style="width:100%;border-collapse:collapse;margin:0"><tr><td style="padding:0;border:none;width:100%"><img src="data:image/png;base64,'+im[0]+'" style="width:100%"/></td></tr></table>';
      var fHtml='<table border="0" cellpadding="0" cellspacing="0" style="width:100%;border-collapse:collapse;margin:0"><tr><td style="padding:0;border:none;width:100%"><img src="data:image/png;base64,'+im[1]+'" style="width:100%"/></td></tr></table>';
      return Word.run(function(ctx){
        var sec=ctx.document.sections.getFirst();
        var h=sec.getHeader(Word.HeaderFooterType.primary); h.clear(); h.insertHtml(hHtml,Word.InsertLocation.replace);
        var f=sec.getFooter(Word.HeaderFooterType.primary); f.clear(); f.insertHtml(fHtml,Word.InsertLocation.replace);
        return ctx.sync();
      });
    }).then(function(){ $("lhBtn").disabled=false; $("lhBtn").textContent="✓ تم تطبيق الورق"; setTimeout(function(){ $("lhBtn").innerHTML=old; },2500); })
      .catch(function(e){ done(); alert("تعذّر تطبيق الورق: "+(e&&e.message?e.message:JSON.stringify(e))); });
  };

  window.insertToWord=function(text){
    Word.run(function(ctx){
      ctx.document.getSelection().insertHtml(mdToWordHtml(text), Word.InsertLocation.replace);
      return ctx.sync();
    }).catch(function(){});
  };

  function styleSelection(){
    Word.run(function(ctx){
      var sel=ctx.document.getSelection(); sel.load("text");
      return ctx.sync().then(function(){
        var text=(sel.text||"").trim();
        if(!text){ alert("حدّد نصاً في المستند أولاً"); return; }
        if($("welcome")) $("welcome").remove();
        chat.push({role:"user",text:"أعد صياغة النص المحدد بأسلوب المحامي."});
        setPhase(PHASE.style);
        chat.push({role:"model",thinking:true}); renderChat(); setBusy(true);
        return fetch(API+"style",{method:"POST",headers:{Authorization:"Basic "+token(),"Content-Type":"application/json"},body:JSON.stringify({text:text})})
          .then(function(r){ return r.ok?r.json():r.json().then(function(d){throw new Error(d.message||"خطأ");}); })
          .then(function(d){
            chat.pop(); chat.push({role:"model",text:d.text}); setBusy(false); renderChat();
            return Word.run(function(c2){ c2.document.getSelection().insertText(d.text,Word.InsertLocation.replace); return c2.sync(); });
          })
          .catch(function(err){ chat.pop(); chat.push({role:"model",text:"⚠️ "+((err&&err.message)||"تعذّرت")}); setBusy(false); renderChat(); });
      });
    }).catch(function(){ setBusy(false); });
  }
  window.styleSelection=styleSelection;
});
</script>
</body>
