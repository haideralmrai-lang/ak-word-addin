<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
html,body{width:1600px;height:96px;overflow:hidden;background:#fff}
.ft{width:1600px;height:96px;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 72px}
.line{width:100%;height:3px;background:linear-gradient(90deg,#bd9552,#e7d3a8,#bd9552);border-radius:3px;margin-bottom:14px}
.row{font-size:18px;font-weight:700;color:#1a3a2a;white-space:nowrap}
.row .sep{color:#bd9552;margin:0 12px;font-weight:900}
.row .thanks{color:#bd9552;font-weight:900}
.row .info{color:#5a6b7b;font-weight:600;direction:ltr;display:inline-block}
</style>
</head>
<body>
<div class="ft">
  <div class="line"></div>
  <div class="row"><span class="thanks">شكراً لثقتكم</span><span class="sep">·</span>شركة عبدالله خالد الراشد للمحاماة والاستشارات القانونية<span class="sep">·</span><span class="info">aklaw-sa.com</span><span class="sep">·</span>الخبر، حي العليا</div>
</div>
</body>
</html>
