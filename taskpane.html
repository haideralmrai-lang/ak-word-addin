<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>مساعد AK للصياغة</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{--g:#1f5a3e;--gd:#123c2a;--gold:#bd9552;--ink:#17212f;--muted:#64748b;--line:#e6ebf1;--bg:#f6f8f7}
*{box-sizing:border-box;font-family:"Tajawal",sans-serif}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh}
.hd{background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;padding:13px 16px;display:flex;align-items:center;gap:11px;flex:0 0 auto}
.hd .logo{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;overflow:hidden}
.hd .logo img{width:27px;height:27px;object-fit:contain;filter:brightness(0) invert(1)}
.hd b{display:block;font-size:.96rem;font-weight:900}.hd span{display:block;font-size:.67rem;opacity:.75}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 6px 18px rgba(15,23,42,.05);margin:14px}
label{font-size:.8rem;font-weight:700;display:block;margin-bottom:6px}
input{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:.92rem;font-family:inherit}
input:focus{outline:none;border-color:var(--gold)}
.btn{border:none;border-radius:11px;padding:12px;font-size:.92rem;font-weight:800;cursor:pointer;width:100%}
.btn-primary{background:var(--g);color:#fff}.btn:disabled{opacity:.55}
.status{font-size:.8rem;font-weight:700;margin-top:10px;padding:9px 11px;border-radius:9px;display:none}
.status.show{display:block}.status.err{background:#fdecec;color:#c0392b}.status.warn{background:#fff7e6;color:#9a6b00}

.chat{flex:1 1 auto;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px;min-height:0}
.welcome{margin:auto 0;text-align:center;padding:10px}
.welcome h2{font-size:1.05rem;font-weight:900;margin:0 0 4px;color:var(--gd)}
.welcome p{font-size:.82rem;color:var(--muted);margin:0 0 18px}
.chips{display:flex;flex-direction:column;gap:9px;max-width:320px;margin:0 auto}
.chip{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:.85rem;font-weight:700;color:var(--ink);cursor:pointer;text-align:right;display:flex;align-items:center;gap:9px;transition:.12s}
.chip:hover{border-color:var(--gold);background:#fffdf8}
.chip .ic{color:var(--gold);font-size:1rem;flex:0 0 auto}
.msg{max-width:92%;padding:11px 13px;border-radius:14px;font-size:.87rem;line-height:1.8;white-space:pre-wrap;word-break:break-word}
.msg.u{align-self:flex-start;background:var(--g);color:#fff;border-bottom-right-radius:4px}
.msg.a{align-self:flex-end;background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
.msg .ins{margin-top:9px;font-size:.74rem;font-weight:800;color:var(--g);background:#eef7f2;border:1px solid #cfe6da;border-radius:8px;padding:6px 10px;cursor:pointer;display:inline-flex;gap:5px;align-items:center}
.msg.a{white-space:normal}
.msg.a h3{font-size:.96rem;font-weight:900;margin:2px 0 8px;color:var(--gd);text-align:center}
.msg.a h4{font-size:.88rem;font-weight:800;margin:10px 0 3px;color:var(--gd)}
.msg.a p{margin:0 0 7px}
.msg.a ol,.msg.a ul{margin:5px 0 9px;padding-right:18px;padding-left:0}
.msg.a li{margin-bottom:5px}
.msg.a strong{font-weight:800}

.files{display:flex;flex-wrap:wrap;gap:6px;padding:0 14px}
.fchip{font-size:.72rem;font-weight:700;background:#eef2f7;border:1px solid var(--line);border-radius:20px;padding:4px 10px;display:flex;align-items:center;gap:6px}
.fchip .x{cursor:pointer;color:#c0392b;font-weight:900}
.toolbar{display:flex;gap:8px;padding:7px 12px 0;background:#fff;flex:0 0 auto}
.tbtn{font-size:.78rem;font-weight:800;color:var(--g);background:#eef7f2;border:1px solid #cfe6da;border-radius:9px;padding:7px 12px;cursor:pointer}
.tbtn:hover{background:#e3f0e9}
.inbar{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line);background:#fff;align-items:flex-end;flex:0 0 auto}
.inbar textarea{flex:1;resize:none;height:44px;max-height:130px;padding:11px 12px;border:1.5px solid var(--line);border-radius:12px;font-size:.9rem;font-family:inherit}
.inbar textarea:focus{outline:none;border-color:var(--gold)}
.iconbtn{flex:0 0 auto;width:44px;height:44px;border-radius:11px;border:1.5px solid var(--line);background:#fff;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center}
.iconbtn.send{background:var(--g);color:#fff;border-color:var(--g)}
.iconbtn:disabled{opacity:.5}
.foot{text-align:center;padding:6px}.foot a{font-size:.73rem;color:var(--muted);text-decoration:none}
.hidden{display:none!important}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,0,0,.15);border-top-color:var(--g);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="hd">
    <div class="logo"><img src="https://aklaw-sa.com/wp-content/uploads/2026/05/Artboard-2.png" alt="AK"/></div>
    <div><b>مساعد الصياغة</b><span>شركة عبدالله خالد الراشد</span></div>
  </div>

  <!-- LOGIN -->
  <div id="loginView" class="card">
    <p style="font-weight:900;margin:0 0 10px">تسجيل الدخول</p>
    <label>اسم المستخدم</label>
    <input id="user" type="text" autocomplete="username"/>
    <label style="margin-top:10px">Application Password</label>
    <input id="pass" type="password" autocomplete="current-password"/>
    <button id="loginBtn" class="btn btn-primary" style="margin-top:14px">دخول</button>
    <div id="loginStatus" class="status"></div>
  </div>

  <!-- CHAT -->
  <div id="appView" class="hidden" style="flex:1 1 auto;display:flex;flex-direction:column;min-height:0">
    <div id="chat" class="chat">
      <div id="welcome" class="welcome">
        <h2>كيف أساعدك في قضيتك؟</h2>
        <p>ارفق المستندات (عقد، صك، محضر، تسجيل) واشرح، أو ابدأ بأحد هذه:</p>
        <div class="chips">
          <div class="chip" data-fill="حلّل المستندات المرفقة واستخرج الأطراف والوقائع والأرقام."><span class="ic">🔍</span> حلّل المستندات المرفقة</div>
          <div class="chip" data-fill="احسب مستحقات نهاية الخدمة بالتفصيل بناءً على المرفقات."><span class="ic">🧮</span> احسب مستحقات نهاية الخدمة</div>
          <div class="chip" data-fill="اكتب صحيفة دعوى كاملة بناءً على المرفقات وما شرحته."><span class="ic">📝</span> اكتب صحيفة دعوى</div>
          <div class="chip" data-fill="اكتب مذكرة جوابية كاملة بناءً على المرفقات."><span class="ic">📄</span> اكتب مذكرة جوابية</div>
          <div class="chip" data-action="style"><span class="ic">✦</span> صِغ النص المحدد بأسلوب المحامي</div>
        </div>
      </div>
    </div>
    <div id="files" class="files"></div>
    <div class="toolbar"><button id="lhBtn" class="tbtn">📄 طبّق الورق الرسمي</button></div>
    <div class="inbar">
      <input id="fileInput" type="file" accept=".pdf,image/*,audio/*,video/*" multiple class="hidden"/>
      <button id="attachBtn" class="iconbtn" title="إرفاق">📎</button>
      <textarea id="chatInput" placeholder="اكتب طلبك... (مثال: اكتب صحيفة دعوى)"></textarea>
      <button id="sendBtn" class="iconbtn send" title="إرسال">➤</button>
    </div>
    <div class="foot"><a href="#" id="logout">تسجيل خروج</a></div>
  </div>

<script>
var API="https://update.aklaw-sa.com/wp-json/ak/v1/";
function $(id){return document.getElementById(id);}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function mdInline(s){ s=esc(s); s=s.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>"); s=s.replace(/__([^_]+)__/g,"<strong>$1</strong>"); return s; }
function mdParse(text){
  var lines=String(text||"").replace(/\r/g,"").split("\n"), blocks=[], list=null;
  function flush(){ if(list){ blocks.push(list); list=null; } }
  for(var i=0;i<lines.length;i++){ var ln=lines[i].trim();
    if(ln===""){ flush(); continue; }
    var num=ln.match(/^(\d+)[\.\)]\s+(.+)$/), bul=ln.match(/^[\*\-•]\s+(.+)$/), hd=ln.match(/^#{1,6}\s*(.+)$/), bold=ln.match(/^\*\*(.+?)\*\*[:：]?\s*$/);
    if(num){ if(!list||list.type!=="ol"){ flush(); list={type:"ol",items:[]}; } list.items.push(num[2]); }
    else if(bul){ if(!list||list.type!=="ul"){ flush(); list={type:"ul",items:[]}; } list.items.push(bul[1]); }
    else if(hd){ flush(); blocks.push({type:"h",text:hd[1]}); }
    else if(bold){ flush(); blocks.push({type:"h",text:bold[1]}); }
    else { flush(); blocks.push({type:"p",text:ln}); }
  }
  flush(); return blocks;
}
function mdToHtml(text){
  var b=mdParse(text), out="", firstH=true;
  for(var i=0;i<b.length;i++){ var x=b[i];
    if(x.type==="h"){ out+= firstH?"<h3>"+mdInline(x.text)+"</h3>":"<h4>"+mdInline(x.text)+"</h4>"; firstH=false; }
    else if(x.type==="p"){ out+="<p>"+mdInline(x.text)+"</p>"; }
    else { out+="<"+x.type+">"+x.items.map(function(it){return "<li>"+mdInline(it)+"</li>";}).join("")+"</"+x.type+">"; }
  }
  return out||("<p>"+esc(text)+"</p>");
}
function mdToWordHtml(text){
  var b=mdParse(text), out="", firstH=true;
  var ff="font-family:'Sakkal Majalla',Tajawal,Tahoma,Arial";
  var body=ff+";direction:rtl;text-align:justify;font-size:15pt;line-height:1.1;color:#111111;margin:0 0 3pt";
  var liS=ff+";direction:rtl;text-align:justify;font-size:15pt;line-height:1.1;color:#111111;margin:0 0 2pt";
  for(var i=0;i<b.length;i++){ var x=b[i];
    if(x.type==="h"){
      out+= firstH ? '<p style="'+ff+';direction:rtl;text-align:center;font-size:17pt;font-weight:bold;color:#111111;line-height:1.15;margin:0 0 8pt">'+mdInline(x.text)+'</p>'
                   : '<p style="'+ff+';direction:rtl;text-align:right;font-size:15pt;font-weight:bold;color:#111111;line-height:1.15;margin:9pt 0 3pt">'+mdInline(x.text)+'</p>';
      firstH=false;
    } else if(x.type==="p"){ out+='<p style="'+body+'">'+mdInline(x.text)+'</p>'; }
    else if(x.type==="ol"){ out+='<ol dir="rtl" style="margin:3pt 0 6pt;padding-right:24px">'+x.items.map(function(it){return '<li style="'+liS+'">'+mdInline(it)+'</li>';}).join("")+'</ol>'; }
    else { out+='<ul dir="rtl" style="margin:3pt 0 6pt;padding-right:24px">'+x.items.map(function(it){return '<li style="'+liS+'">'+mdInline(it)+'</li>';}).join("")+'</ul>'; }
  }
  return out;
}
function token(){return localStorage.getItem("ak_token")||"";}
function setStatus(el,msg,kind){el.className="status show "+(kind||"");el.textContent=msg;}
var chat=[], attachments=[], working=false;

Office.onReady(function(){
  if(token()){ $("loginView").classList.add("hidden"); $("appView").classList.remove("hidden"); }

  $("loginBtn").onclick=function(){
    var u=$("user").value.trim(), p=$("pass").value.replace(/\s/g,"");
    if(!u||!p){ setStatus($("loginStatus"),"أدخل البيانات","warn"); return; }
    var t=btoa(u+":"+p); setStatus($("loginStatus"),"جاري التحقق...","warn"); $("loginBtn").disabled=true;
    fetch(API+"ping",{headers:{Authorization:"Basic "+t}})
      .then(function(r){return r.ok?r.json():Promise.reject();})
      .then(function(){ localStorage.setItem("ak_token",t); $("loginBtn").disabled=false; $("loginView").classList.add("hidden"); $("appView").classList.remove("hidden"); })
      .catch(function(){ $("loginBtn").disabled=false; setStatus($("loginStatus"),"تعذّر الدخول. تأكد من البيانات.","err"); });
  };
  $("logout").onclick=function(e){ e.preventDefault(); localStorage.removeItem("ak_token"); location.reload(); };

  // chips
  document.querySelectorAll(".chip").forEach(function(c){
    c.onclick=function(){
      if(c.dataset.action==="style"){ styleSelection(); return; }
      $("chatInput").value=c.dataset.fill||""; $("chatInput").focus();
      var t=$("chatInput"); t.style.height="44px"; t.style.height=Math.min(t.scrollHeight,150)+"px";
    };
  });

  // attachments
  $("attachBtn").onclick=function(){ $("fileInput").click(); };
  $("fileInput").onchange=function(e){ var fs=e.target.files; for(var i=0;i<fs.length;i++){ uploadFile(fs[i]); } e.target.value=""; };

  function uploadFile(f){
    var mime=f.type||"application/octet-stream";
    if(f.size <= 1024*1024){
      var rd=new FileReader();
      rd.onload=function(){ attachments.push({mime:mime,name:f.name,data:String(rd.result).split(",")[1]||"",ready:true}); renderFiles(); };
      rd.readAsDataURL(f); return;
    }
    var att={mime:mime,name:f.name,ready:false,prog:"يرفع 0%"}; attachments.push(att); renderFiles();
    fetch(API+"upload/start",{method:"POST",headers:{Authorization:"Basic "+token(),"Content-Type":"application/json"},body:JSON.stringify({name:f.name,mime:mime,size:f.size})})
      .then(function(r){return r.ok?r.json():Promise.reject();})
      .then(function(d){ if(!d.upload_id) throw new Error(); return sendChunks(f,d.upload_id,att); })
      .catch(function(){ att.prog="فشل الرفع ✗"; renderFiles(); });
  }
  function sendChunks(f,uploadId,att){
    var CH=5*1024*1024, offset=0;
    function step(){
      var end=Math.min(offset+CH,f.size), last=(end>=f.size), blob=f.slice(offset,end);
      return new Promise(function(res,rej){
        var rd=new FileReader();
        rd.onload=function(){
          var b64=String(rd.result).split(",")[1]||"";
          fetch(API+"upload/chunk",{method:"POST",headers:{Authorization:"Basic "+token(),"Content-Type":"application/json"},body:JSON.stringify({upload_id:uploadId,offset:offset,last:last,data:b64})})
            .then(function(r){return r.ok?r.json():Promise.reject();})
            .then(function(d){
              offset=end; att.prog="يرفع "+Math.round(offset/f.size*100)+"%"; renderFiles();
              if(last){ att.uri=d.uri; att._name=d.name;
                if(d.state==="ACTIVE"){ att.ready=true; att.prog=""; } else { att.prog="يعالج…"; pollStatus(att); }
                renderFiles(); res();
              } else { res(step()); }
            }).catch(rej);
        };
        rd.onerror=rej; rd.readAsDataURL(blob);
      });
    }
    return step();
  }
  function pollStatus(att){
    var n=0; var iv=setInterval(function(){ n++;
      fetch(API+"upload/status?name="+encodeURIComponent(att._name),{headers:{Authorization:"Basic "+token()}})
        .then(function(r){return r.json();})
        .then(function(d){
          if(d.state==="ACTIVE"){ clearInterval(iv); att.ready=true; att.prog=""; if(d.uri)att.uri=d.uri; renderFiles(); }
          else if(d.state==="FAILED"||n>80){ clearInterval(iv); att.prog="فشل المعالجة ✗"; renderFiles(); }
        }).catch(function(){});
    },3000);
  }
  function renderFiles(){
    $("files").innerHTML=attachments.map(function(a,i){return '<span class="fchip">📄 '+esc(a.name)+(a.prog?' <small style="color:#9a6b00">('+a.prog+')</small>':'')+' <span class="x" data-i="'+i+'">×</span></span>';}).join("");
    $("files").querySelectorAll(".x").forEach(function(x){ x.onclick=function(){ attachments.splice(+this.dataset.i,1); renderFiles(); }; });
  }

  function renderChat(){
    var box=$("chat");
    if(!chat.length){ return; }
    if($("welcome")) $("welcome").remove();
    box.innerHTML=chat.map(function(m,i){
      var cls=m.role==="user"?"u":"a";
      var body=(m.role==="user")?esc(m.text):mdToHtml(m.text);
      var ins=(m.role==="model"&&m.text&&m.text.indexOf("⚠️")!==0&&m.text!=="يكتب الآن...")?'<div class="ins" data-i="'+i+'">⬇ أدرج في المستند</div>':'';
      return '<div class="msg '+cls+'">'+body+ins+'</div>';
    }).join("");
    box.querySelectorAll(".ins").forEach(function(b){ b.onclick=function(){ insertToWord(chat[+this.dataset.i].text); }; });
    box.scrollTop=box.scrollHeight;
  }

  function setBusy(on){ working=on; $("sendBtn").disabled=on; $("attachBtn").disabled=on; }

  function send(text){
    if(working) return;
    chat.push({role:"user",text:text});
    chat.push({role:"model",text:"يكتب الآن..."});
    renderChat(); setBusy(true);
    var atts=attachments.filter(function(a){return a.ready;}).map(function(a){ return a.uri ? {mime:a.mime,uri:a.uri} : {mime:a.mime,data:a.data}; });
    var payload={messages:chat.filter(function(m){return m.text!=="يكتب الآن...";}),attachments:atts,mode:"chat",doc_type:""};
    fetch(API+"case",{method:"POST",headers:{Authorization:"Basic "+token(),"Content-Type":"application/json"},body:JSON.stringify(payload)})
      .then(function(r){
        if(r.status===401){ localStorage.removeItem("ak_token"); location.reload(); throw new Error("انتهت الجلسة"); }
        return r.json().then(function(d){ if(!r.ok) throw new Error(d&&d.message?d.message:"تعذّر"); return d; });
      })
      .then(function(d){ chat.pop(); chat.push({role:"model",text:d.reply}); renderChat(); setBusy(false); })
      .catch(function(err){ chat.pop(); chat.push({role:"model",text:"⚠️ "+((err&&err.message)||"تعذّر الاتصال")}); renderChat(); setBusy(false); });
  }

  function growInput(){ var t=$("chatInput"); t.style.height="44px"; t.style.height=Math.min(t.scrollHeight,150)+"px"; }
  $("sendBtn").onclick=function(){ var t=$("chatInput").value.trim(); if(!t) return; $("chatInput").value=""; growInput(); send(t); };
  $("chatInput").oninput=growInput;
  $("chatInput").onkeydown=function(e){ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); $("sendBtn").click(); } };

  function loadB64(url){
    return fetch(url,{cache:"no-store"}).then(function(r){return r.blob();}).then(function(b){
      return new Promise(function(res,rej){ var rd=new FileReader(); rd.onload=function(){ res(String(rd.result).split(",")[1]); }; rd.onerror=rej; rd.readAsDataURL(b); });
    });
  }
  $("lhBtn").onclick=function(){
    $("lhBtn").disabled=true; var old=$("lhBtn").textContent; $("lhBtn").textContent="جاري التطبيق...";
    function done(){ $("lhBtn").disabled=false; $("lhBtn").textContent=old; }
    var dir=location.href.replace(/[^/]*$/,"");
    Promise.all([loadB64(dir+"letterhead-head.png"),loadB64(dir+"letterhead-foot.png")]).then(function(im){
      var hHtml='<table border="0" cellpadding="0" cellspacing="0" style="width:100%;border-collapse:collapse;margin:0"><tr><td style="padding:0;border:none;width:100%"><img src="data:image/png;base64,'+im[0]+'" style="width:100%"/></td></tr></table>';
      var fHtml='<table border="0" cellpadding="0" cellspacing="0" style="width:100%;border-collapse:collapse;margin:0"><tr><td style="padding:0;border:none;width:100%"><img src="data:image/png;base64,'+im[1]+'" style="width:100%"/></td></tr></table>';
      return Word.run(function(ctx){
        var sec=ctx.document.sections.getFirst();
        var h=sec.getHeader(Word.HeaderFooterType.primary); h.clear(); h.insertHtml(hHtml,Word.InsertLocation.replace);
        var f=sec.getFooter(Word.HeaderFooterType.primary); f.clear(); f.insertHtml(fHtml,Word.InsertLocation.replace);
        return ctx.sync();
      });
    }).then(function(){ $("lhBtn").disabled=false; $("lhBtn").textContent="✓ تم تطبيق الورق"; setTimeout(function(){ $("lhBtn").textContent=old; },2500); })
      .catch(function(e){ done(); alert("تعذّر تطبيق الورق: "+(e&&e.message?e.message:JSON.stringify(e))); });
  };

  window.insertToWord=function(text){
    Word.run(function(ctx){
      ctx.document.getSelection().insertHtml(mdToWordHtml(text), Word.InsertLocation.replace);
      return ctx.sync();
    }).catch(function(){});
  };

  function styleSelection(){
    Word.run(function(ctx){
      var sel=ctx.document.getSelection(); sel.load("text");
      return ctx.sync().then(function(){
        var text=(sel.text||"").trim();
        if(!text){ alert("حدّد نصاً في المستند أولاً"); return; }
        chat.push({role:"user",text:"أعد صياغة النص المحدد بأسلوب المحامي."});
        chat.push({role:"model",text:"يكتب الآن..."}); renderChat(); setBusy(true);
        return fetch(API+"style",{method:"POST",headers:{Authorization:"Basic "+token(),"Content-Type":"application/json"},body:JSON.stringify({text:text})})
          .then(function(r){ return r.ok?r.json():r.json().then(function(d){throw new Error(d.message||"خطأ");}); })
          .then(function(d){
            chat.pop(); chat.push({role:"model",text:d.text}); renderChat(); setBusy(false);
            return Word.run(function(c2){ c2.document.getSelection().insertText(d.text,Word.InsertLocation.replace); return c2.sync(); });
          })
          .catch(function(err){ chat.pop(); chat.push({role:"model",text:"⚠️ "+((err&&err.message)||"تعذّرت")}); renderChat(); setBusy(false); });
      });
    }).catch(function(){ setBusy(false); });
  }
});
